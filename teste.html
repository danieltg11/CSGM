<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Accordion Exemplo</title>
  <style>
    .accordion {
      background-color: #eee;
      color: #444;
      cursor: pointer;
      padding: 15px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }

    .accordion:hover {
      background-color: #ccc;
    }

    .active, .accordion:focus {
      background-color: #ddd;
    }

    .panel {
      padding: 0 15px;
      display: none;
      background-color: white;
      overflow: hidden;
    }
  </style>
</head>
<body>

<h2>Accordion Estilizado</h2>

<button class="accordion">Seção 1</button>
<div class="panel">
  <p>Este é o conteúdo da primeira seção.</p>
</div>

<button class="accordion">Seção 2</button>
<div class="panel">
  <p>Texto da segunda seção, que aparece ao expandir.</p>
</div>

<button class="accordion">Seção 3</button>
<div class="panel">
  <p>Mais conteúdo aqui dentro.</p>
</div>

<script>
  const acc = document.querySelectorAll(".accordion");
  acc.forEach(button => {
    button.addEventListener("click", function() {
      this.classList.toggle("active");
      const panel = this.nextElementSibling;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });
  });
</script>

</body>
</html>
